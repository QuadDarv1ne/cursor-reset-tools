version: '3.8'

services:
  cursor-reset-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-reset-tools
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WS_PORT=3001
      - LOG_LEVEL=info
      - AUTO_UPDATE_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cursor-network

networks:
  cursor-network:
    driver: bridge
